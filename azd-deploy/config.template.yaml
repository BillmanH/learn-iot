# ==============================================================================
# azd-deploy/config.template.yaml
#
# USAGE:
#   cp azd-deploy/config.template.yaml azd-deploy/config.yaml
#   # Edit config.yaml with your values, then run:
#   azd up
#
# The pre-provision hook (scripts/pre-provision.ps1) reads config.yaml and
# writes the values into the azd environment before Bicep runs.
# config.yaml values ALWAYS overwrite the azd environment — this file is the
# authoritative source of truth and prevents stale env state from winning.
#
# config.yaml is gitignored (contains your subscription ID and resource names).
# This template file is the version you commit.
# ==============================================================================

# ------------------------------------------------------------
# Core Azure Settings
# Required — azd will prompt interactively if left blank.
# ------------------------------------------------------------

# Short label for this deployment. Used as the azd environment name.
# Lowercase alphanumeric and hyphens only, e.g.: aio-dev
env_name: ""

# Your Azure subscription ID.
# Get it with: az account show --query id -o tsv
subscription_id: ""

# Azure region for all resources.
# Common choices: eastus, westus2, westeurope, australiaeast
location: eastus

# Resource group name. Created automatically if it does not exist.
# Leave blank to let azd generate one: rg-<env-name>
resource_group: ""

# Azure Key Vault name (3-24 chars, globally unique across ALL of Azure).
# Key Vault names are held in soft-delete for 90 days after the vault is deleted.
# If you re-deploy into a new RG you MUST choose a new name (or purge the old vault first).
# Pick something unique, e.g.: kv-aio-<yourname or team>-<env>
# Required — deployment will fail if left blank.
key_vault_name: ""

# ------------------------------------------------------------
# VM Settings
# ------------------------------------------------------------

# Azure VM size. Standard_D4s_v3 (4 vCPU / 16 GB) is the AIO minimum.
# Upgrade to Standard_D8s_v3 (8 vCPU / 32 GB) for heavier workloads.
vm_size: Standard_D4s_v3

# Linux admin username for the VM.
vm_admin_username: aiouser

# Keep SSH port 22 open in the NSG after provisioning.
# Set to false for a locked-down VM. All automation uses
# az vm run-command and az connectedk8s proxy — SSH is never required.
open_ssh_port: true

# ------------------------------------------------------------
# Optional Tools (installed on the VM during first boot)
# ------------------------------------------------------------

# k9s — terminal-based Kubernetes dashboard (https://k9scli.io/)
# Useful for exploring AIO pods, logs, and resource state interactively.
install_k9s: false

# mqttui — terminal MQTT client (https://github.com/EdJoPaTo/mqttui)
# Useful for verifying the AIO MQTT broker and watching module messages.
install_mqttui: false

# ------------------------------------------------------------
# Edge Module Deployment
# Set to true to build, push, and deploy a module during `azd up`.
# Modules can also be deployed later without re-running azd:
#   pwsh azd-deploy/scripts/deploy-modules.ps1 -Module edgemqttsim
# ------------------------------------------------------------

deploy_module_edgemqttsim: false
deploy_module_sputnik: false
deploy_module_hello_flask: false
deploy_module_demohistorian: false
